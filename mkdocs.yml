site_name: sdata-testdata
site_description: Modulare Ontologien fuer mechanische Pruefdaten
site_url: https://lepy.github.io/sdata-experiments/
repo_name: sdata-testdata

theme:
  name: material
  language: de
  features:
    - navigation.tabs
    - navigation.top
    - navigation.instant
    - navigation.sections
    - toc.follow
    - search.highlight
    - content.code.copy
  palette:
    - scheme: default
      primary: teal
      accent: amber

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - pymdownx.highlight
  - pymdownx.superfences
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.details

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - Architektur: architecture.md
  - Deployment: deployment.md
  - Module:
      - Core: modules/core.md
      - Quantities: modules/quantities.md
      - Tensile Test: modules/tensiletest.md
      - TensileTestResult: modules/tensiletest-result.md
      - Compression Test: modules/compressiontest.md
      - Bending Test: modules/bendingtest.md
      - Fatigue Test: modules/fatiguetest.md
      - Shapes: modules/shapes.md
      - Vocabularies: modules/vocabularies.md
  - Validation: validation.md
